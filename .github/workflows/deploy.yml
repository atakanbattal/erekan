name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy site via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /public_html/
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/portal/**
            **/generate_*.py
            **/cleanup_*.py
            **/update_*.py
            **/README.md

# Portal deploys via manual zip upload (Build portal.zip workflow artifact).
# FTP portal deploy was removed — Hostinger Node.js Web App no longer uses FTP_PORTAL_DIR.
