<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050609"/>
      <stop offset="0.45" stop-color="#0b0d12"/>
      <stop offset="1" stop-color="#15110d"/>
    </linearGradient>
    <radialGradient id="arcGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1450 515) rotate(120) scale(540 360)">
      <stop offset="0" stop-color="#ff7a1a" stop-opacity="0.62"/>
      <stop offset="0.22" stop-color="#ffb35c" stop-opacity="0.2"/>
      <stop offset="0.62" stop-color="#ff7a1a" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ff7a1a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="plate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a3038" stop-opacity="0.72"/>
      <stop offset="0.5" stop-color="#131820" stop-opacity="0.76"/>
      <stop offset="1" stop-color="#07090d" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7b8794" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#c7d0d8" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ff9a3d" stop-opacity="0.42"/>
    </linearGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 H 0 V 80" stroke="#ffffff" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <pattern id="fineGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 H 0 V 20" stroke="#ffffff" stroke-opacity="0.018" stroke-width="1"/>
    </pattern>
    <linearGradient id="readability" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#050609" stop-opacity="0.92"/>
      <stop offset="0.42" stop-color="#050609" stop-opacity="0.58"/>
      <stop offset="0.75" stop-color="#050609" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#050609" stop-opacity="0.28"/>
    </linearGradient>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.06"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#fineGrid)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <rect width="1920" height="1080" fill="url(#arcGlow)"/>

  <g opacity="0.34">
    <path d="M1090 165 L1740 340 L1606 858 L936 690 Z" fill="url(#plate)" stroke="#5f6b78" stroke-opacity="0.28"/>
    <path d="M1192 255 L1636 374 L1552 700 L1088 582 Z" stroke="url(#edge)" stroke-width="2" stroke-opacity="0.9"/>
    <path d="M1308 285 L1272 442 L1518 506 L1552 352" stroke="#e8eef5" stroke-opacity="0.08" stroke-width="1.5"/>
    <path d="M1078 684 L1606 858" stroke="#ff7a1a" stroke-opacity="0.22" stroke-width="2"/>
  </g>

  <g opacity="0.22">
    <path d="M1180 756 L1788 914" stroke="#d6dee8" stroke-opacity="0.18"/>
    <path d="M1222 782 L1818 936" stroke="#d6dee8" stroke-opacity="0.1"/>
    <path d="M1260 808 L1660 912" stroke="#ff7a1a" stroke-opacity="0.16"/>
    <circle cx="1450" cy="515" r="132" stroke="#ff7a1a" stroke-opacity="0.16"/>
    <circle cx="1450" cy="515" r="214" stroke="#ff7a1a" stroke-opacity="0.08"/>
  </g>

  <g opacity="0.42" filter="url(#softBlur)">
    <ellipse cx="1476" cy="520" rx="118" ry="64" fill="#ff7a1a" fill-opacity="0.18"/>
    <ellipse cx="1540" cy="438" rx="62" ry="34" fill="#ffcf8a" fill-opacity="0.13"/>
  </g>

  <g opacity="0.26">
    <path d="M80 846 H820" stroke="#ffffff" stroke-opacity="0.08"/>
    <path d="M80 884 H640" stroke="#ffffff" stroke-opacity="0.06"/>
    <path d="M80 922 H720" stroke="#ffffff" stroke-opacity="0.045"/>
    <path d="M110 830 V948" stroke="#ff7a1a" stroke-opacity="0.18"/>
    <path d="M790 830 V948" stroke="#ff7a1a" stroke-opacity="0.1"/>
  </g>

  <g opacity="0.2">
    <path d="M1030 186 h170 m-170 0 v170" stroke="#ffffff" stroke-opacity="0.22"/>
    <path d="M1700 816 h-170 m170 0 v-170" stroke="#ffffff" stroke-opacity="0.16"/>
    <path d="M1280 214 l52 14 m-52 -14 l-14 52" stroke="#ff7a1a" stroke-opacity="0.32"/>
  </g>

  <rect width="1920" height="1080" fill="url(#grain)" opacity="0.38"/>
  <rect width="1920" height="1080" fill="url(#bg)" opacity="0.12"/>
  <rect width="1920" height="1080" fill="url(#readability)"/>
</svg>
